<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio — Your Name</title>

    <!-- ── Google Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>

        /* ╔══════════════════════════════════════════════════════╗
           ║  CSS VARIABLES — single source of truth for colours  ║
           ╚══════════════════════════════════════════════════════╝ */
        :root {
            /* ── Page & Nav ── */
            --bg:           #0F172A;
            --nav-text:     #9CA3AF;
            --nav-hover:    #d1d5db;
            --nav-active:   #ffffff;
            --cursor-clr:   #d1d5db;

            /* ── PCB / LED ── */
            --pcb:          #fb923c;
            --led-glow:     #Fb923c;

            /* ── Code syntax — Tokyo Night theme ── */
            --kw:           #aa7cff;               /* keywords    */
            --str:          #C0CAF5;               /* strings     */
            --num:          #FF9E64;               /* numbers     */
            --fn:           #7AA2F7;               /* functions   */
            --br:           #565F89;               /* brackets    */
            --prop:         #ffffff;               /* properties  */
            --cm:           rgb(180, 236, 120);  /* comments    */
            --code-fg:      #353c5e;               /* base text   */
            --ln-clr:       #3B4261;               /* line nums   */

            /* ── Typography ── */
            --heading:      #f1f3f5;
            --body-clr:     #f1f3f5;

            /* ── Layout ── */
            --pcb-x:   200px;   /* PCB track distance from page-wrapper left */
            --cnt-x:   240px;   /* content starts this far from left         */
        }


        /* ╔══════════════════════════════════════════════════════╗
           ║  RESET & BASE                                        ║
           ╚══════════════════════════════════════════════════════╝ */
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--body-clr);
            overflow-x: hidden;
        }


        /* ╔══════════════════════════════════════════════════════╗
           ║  CUSTOM CURSOR                                       ║
           ╚══════════════════════════════════════════════════════╝ */
        #cursor {
            position: fixed;
            width: 10px; height: 10px;
            border: 2px solid var(--cursor-clr);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: left 0.04s linear, top 0.04s linear;
        }

        /* Ripple ring spawned on each click */
        .cursor-ripple {
            position: fixed;
            border-radius: 50%;
            border: 1.5px solid var(--cursor-clr);
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple-out 0.65s ease-out forwards;
        }

        @keyframes ripple-out {
            0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0.85; }
            100% { transform: translate(-50%,-50%) scale(4.5); opacity: 0;    }
        }


        /* ╔══════════════════════════════════════════════════════╗
           ║  NAVIGATION BAR                                      ║
           ╚══════════════════════════════════════════════════════╝ */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 600;
            display: flex;
            justify-content: center;
            gap: 52px;
            padding: 20px 0;
            background:#0F172A;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid #0F172A;
        }

        .nav-link {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--nav-text);
            text-decoration: none;
            letter-spacing: 0.05em;
            position: relative;
            transition: color 0.2s ease;
        }

        /* Hover underline sweep */
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -3px; left: 0;
            width: 0; height: 1.5px;
            background: var(--nav-hover);
            transition: width 0.25s ease;
        }

        .nav-link:hover              { color: var(--nav-hover); }
        .nav-link:hover::after       { width: 100%; }

        /* Active = white + bold + underline */
        .nav-link.active             { font-weight: 700; color: var(--nav-active); }
        .nav-link.active::after      { width: 100%; background: var(--nav-active); }


        /* ╔══════════════════════════════════════════════════════╗
           ║  PAGE LAYOUT                                         ║
           ╚══════════════════════════════════════════════════════╝ */
        main { padding-top: 72px; }

        .page-wrapper {
            position: relative;
            padding-right: 80px;
        }


        /* ╔══════════════════════════════════════════════════════╗
           ║  PCB VERTICAL TRACK                                  ║
           ╚══════════════════════════════════════════════════════╝ */
        #pcb-track {
            position: absolute;
            left: var(--pcb-x);
            top: 0; bottom: 0;
            width: 2px;
            background: var(--pcb);
            z-index: 10;
        }

        /* Hollow LED bullet — unlit state */
        .led-dot {
            position: absolute;
            left: -6px;
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid var(--pcb);
            background: transparent;
            transition: background 0.35s ease, box-shadow 0.35s ease;
            z-index: 12;
        }

        /* LED glow — active section */
        .led-dot.lit {
            background: var(--led-glow);
            box-shadow:
                0 0 5px  var(--led-glow),
                0 0 12px var(--led-glow),
                0 0 28px rgba(215, 203, 188, 0.65),
                0 0 50px rgba(255, 209, 102, 0.30);
        }

        /* Decorative PCB pad notch between sections */
        .pcb-notch {
            position: absolute;
            left: -8px;
            width: 18px; height: 24px;
            border: 2px solid var(--pcb);
            background: var(--bg);
            border-radius: 2px;
            z-index: 11;
        }


        /* ╔══════════════════════════════════════════════════════╗
           ║  SECTIONS — shared                                   ║
           ╚══════════════════════════════════════════════════════╝ */
        section {
            position: relative;
            min-height: 100vh;
            padding: 80px 80px 100px var(--cnt-x);
        }

        .section-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 44px;
            font-weight: 600;
            color: var(--heading);
            letter-spacing: -0.02em;
            margin-bottom: 56px;
        }


        /* ╔══════════════════════════════════════════════════════╗
           ║  BRANCH ITEMS — solid bullet + horizontal PCB trace  ║
           ║  Used in Start and Contact sections                  ║
           ╚══════════════════════════════════════════════════════╝ */
        .branch-item {
            position: relative;
            margin-bottom: 44px;
            padding-left: 2px;
        }

        /* Horizontal trace from track to bullet */
        .branch-item::before {
            content: '';
            position: absolute;
            left: -40px; top: 50%;
            transform: translateY(-50%);
            width: 28px; height: 2px;
            background: var(--pcb);
        }

        /* Solid filled bullet */
        .branch-item::after {
            content: '';
            position: absolute;
            left: -14px; top: 50%;
            transform: translateY(-50%);
            width: 10px; height: 10px;
            background: var(--pcb);
            border-radius: 50%;
        }


        /* ╔══════════════════════════════════════════════════════╗
           ║  START SECTION                                       ║
           ╚══════════════════════════════════════════════════════╝ */
        #start {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .start-greeting {
            font-size: 17px;
            font-weight: 500;
            color: var(--body-clr);
            opacity: 0.50;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        /* The animated name */
        #slot-name {
            font-family: 'DM Sans', sans-serif;
            font-size: 58px;
            font-weight: 600;
            color: var(--heading);
            letter-spacing: -0.025em;
            line-height: 1.05;
        }

        .slot-char { display: inline-block; }

        .start-intro {
          
            font-size: 16px;
            font-weight: 500;
            color: var(--body-clr);
            opacity: 0.70;
            line-height: 1.65;
            max-width: 480px;
        }

        /* ── Start Section Layout with Photo ── */
#start {
    display: block !important;   /* override the column flex from before */
}

#start .section-inner {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 48px;
}

#start .start-text {
    flex: 1;
    min-width: 0;               /* allows text to shrink properly */
}

#start .start-photo {
    flex-shrink: 0;
    width:  clamp(180px, 22vw, 300px);
    height: clamp(180px, 22vw, 300px);
    border-radius: 50%;         /* makes it a circle */
    border: 2px solid var(--pcb);
    box-shadow:
        0 0 8px  var(--led-glow),
        0 0 20px var(--led-glow),
        0 0 45px rgba(251, 146, 60, 0.40);
    object-fit: cover;
    object-position: center top;
    display: block;
}

/* On narrow screens — stack vertically */
@media (max-width: 200px) {
    #start .section-inner {
        flex-direction: column;
        align-items: flex-start;
    }
    #start .start-photo {
        width: 180px;
        height: 180px;
    }
}


        /* ╔══════════════════════════════════════════════════════╗
           ║  CODE SECTIONS — Lab & About                         ║
           ║  Integrated into the page (no separate dark box).    ║
           ║  Line numbers live in the LEFT gutter before PCB.    ║
           ║  Code text lives in the RIGHT gutter after PCB.      ║
           ╚══════════════════════════════════════════════════════╝ */

        /* Remove side padding so code rows span full width */
        #lab, #about { padding-left: 0; padding-right: 0; }

        /* Heading inside code sections stays indented at --cnt-x */
        #lab .section-title,
        #about .section-title { padding-left: var(--cnt-x); }

        /*  Three-column grid per row:
            col 1  [var(--pcb-x)]  = line number (left gutter, before PCB)
            col 2  [40px]          = empty bridge across the PCB line
            col 3  [1fr]           = code text (right gutter, after PCB)    */
        .code-row {
            display: grid;
            grid-template-columns: var(--pcb-x) 40px 1fr;
            align-items: baseline;
            line-height: 1.90;
            min-height: 1.9em;
        }

        /* Line number — right-aligned, ends just before the PCB track */
        .ln {
            grid-column: 1;
            text-align: right;
            padding-right: 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            font-weight: 400;
            color: var(--ln-clr);
            user-select: none;
        }

        /* FIX: white-space changed from 'pre' to 'pre-wrap' so long lines
           wrap instead of overflowing off-screen on smaller windows.
           overflow-wrap ensures even unbreakable strings (long URLs, etc.)
           will wrap rather than escape the container.                       */
        .lc {
            grid-column: 3;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 400;
            color: var(--code-fg);
            white-space: pre-wrap;       /* was: pre — now wraps long lines  */
            overflow-wrap: break-word;   /* breaks truly unbreakable strings  */
            word-break: break-word;      /* fallback for older browsers       */
            padding-right: 40px;
        }

        /* ── Syntax colour classes — Tokyo Night ── */
        .k  { color: var(--kw);   }
        .s  { color: var(--str);  }
        .n  { color: var(--num);  }
        .f  { color: var(--fn);   }
        .b  { color: var(--br);   }
        .p  { color: var(--prop); }
        .cm { color: var(--cm); font-style: italic; }
        .t  { color: var(--code-fg); }


        /* ╔══════════════════════════════════════════════════════╗
           ║  CONTACT SECTION                                     ║
           ╚══════════════════════════════════════════════════════╝ */

        /* FIX: label text is now full white (was 45% opacity grey) */
        .contact-label {
            font-size: 11.5px;
            font-weight: 500;
            color: #ffffff;              /* was: var(--body-clr) at 0.45 opacity */
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .contact-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--heading);
        }

        .contact-value a {
            color: var(--nav-text);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .contact-value a:hover { color: var(--nav-hover); }


        /* ╔══════════════════════════════════════════════════════╗
           ║  SCROLLBAR                                           ║
           ╚══════════════════════════════════════════════════════╝ */
        ::-webkit-scrollbar       { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--pcb); border-radius: 3px; }


        /* ╔══════════════════════════════════════════════════════╗
           ║  RESPONSIVE                                          ║
           ╚══════════════════════════════════════════════════════╝ */
        @media (max-width: 768px) {
            :root { --pcb-x: 70px; --cnt-x: 110px; }
            .section-title { font-size: 30px; }
            #slot-name { font-size: 34px; }
            nav { gap: 20px; }
            .nav-link { font-size: 12px; }
            .page-wrapper { padding-right: 20px; }
            .lc { font-size: 10.5px; }
        }

    </style>
</head>
<body>


<!-- ═══════════════════════════════════════════════════════════
     CUSTOM CURSOR DOT
═══════════════════════════════════════════════════════════ -->
<div id="cursor"></div>


<!-- ═══════════════════════════════════════════════════════════
     NAVIGATION BAR
═══════════════════════════════════════════════════════════ -->
<nav id="navbar">
    <a href="#start"   class="nav-link" data-sec="start"  >Start/&gt;</a>
    <a href="#lab"     class="nav-link" data-sec="lab"    >Lab/&gt;</a>
    <a href="#about"   class="nav-link" data-sec="about"  >About/&gt;</a>
    <a href="#contact" class="nav-link" data-sec="contact">Contact/&gt;</a>
</nav>


<!-- ═══════════════════════════════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════════════════════════════ -->
<main>
<div class="page-wrapper" id="page-wrapper">

    <!-- PCB vertical track — LED dots & notches injected by JS -->
    <div id="pcb-track"></div>


    <!-- ══════════════════════════════════════════════════════
         SECTION 1 — START
    ══════════════════════════════════════════════════════ -->
    <section id="start">
    <h1 class="section-title">Start/&gt;</h1>

    <div class="section-inner">

        <div class="start-text">
            <div class="branch-item">
                <p class="start-greeting">Hello, I'm</p>
                <div id="slot-name">Ch Neha Singha</div>
            </div>
            <div class="branch-item">
                <p class="start-intro">
                    Engineering student passionate about technology, design,

                </p>
            </div>
        </div>

        <img
            class="start-photo"
            src="myphoto.jpeg"

        />

    </div>
</section>


    <!-- ══════════════════════════════════════════════════════
         SECTION 2 — LAB
         Code-editor style, no dark box, same page background.
         Line numbers in left gutter, code in right gutter.
    ══════════════════════════════════════════════════════ -->
    <section id="lab">
        <h2 class="section-title">Lab/&gt;</h2>
        <div id="lab-code"></div>
    </section>


    <!-- ══════════════════════════════════════════════════════
         SECTION 3 — ABOUT
         Same integrated code-editor layout as Lab.
    ══════════════════════════════════════════════════════ -->
    <section id="about">
        <h2 class="section-title">About/&gt;</h2>
        <div id="about-code"></div>
    </section>


    <!-- ══════════════════════════════════════════════════════
         SECTION 4 — CONTACT
         Branch-item layout with solid-bullet PCB traces.
    ══════════════════════════════════════════════════════ -->
    <section id="contact">
        <h2 class="section-title">Contact/&gt;</h2>

        <div class="branch-item">
            <div class="contact-label">phone no.</div>
            <div class="contact-value">
                <a href="tel:+918099106986">+91 8099106986</a>
            </div>
        </div>

        <div class="branch-item">
            <div class="contact-label">email</div>
            <div class="contact-value">
                <a href="mailto:chnehasingha@gmail.com">chnehasingha@gmail.com</a>
            </div>
        </div>

        <div class="branch-item">
            <div class="contact-label">linkedin</div>

                <a href="https://www.linkedin.com/in/ch-neha-singha?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=ios_app" target="_blank">
                    linkedin.com/in/yourname
                </a>
            </div>
        </div>
    </section>

</div><!-- /.page-wrapper -->
</main>


<script>

/* ══════════════════════════════════════════════════════════════
   CUSTOM CURSOR
   Follows the mouse. Spawns an expanding ripple ring on click.
══════════════════════════════════════════════════════════════ */
const cursor = document.getElementById('cursor');

document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
});

document.addEventListener('click', e => {
    const r = document.createElement('div');
    r.className = 'cursor-ripple';
    r.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;width:10px;height:10px;`;
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 750);
});


/* ══════════════════════════════════════════════════════════════
   CODE RENDERER
   Takes a container ID and an array of HTML-with-spans strings.
   Builds zero-padded line-number + code-content rows inside it.
   Adding/removing strings from the array auto-renumbers lines.
══════════════════════════════════════════════════════════════ */
function renderCode(containerId, lines) {
    const el = document.getElementById(containerId);
    if (!el) return;

    el.innerHTML = lines
        .map((line, i) =>
            `<div class="code-row">` +
                `<span class="ln">${String(i + 1).padStart(2, '0')}</span>` +
                `<span></span>` +
                `<span class="lc">${line === '' ? ' ' : line}</span>` +
            `</div>`
        )
        .join('');
}


/* ═════════════════════════════════════════════════════════════
   LAB CONTENT — written as a JS const object
   Syntax classes:  k=keyword  f=function  s=string  n=number
                    b=bracket  p=property  cm=comment  t=plain
═════════════════════════════════════════════════════════════ */

renderCode('lab-code', [

`<span class="k">const</span> <span class="f">lab</span> <span class="t">= {</span>`,
``,

`  <span class="cm">// ── Hardware Projects ─────────────────────────────</span>`,
`  <span class="p">hardware</span><span class="t">: [</span>`,

`    <span class="b">{</span>`,
`      <span class="p">ProjectTitle</span>       <span class="t">: </span><span class="s">"Smart Health Monitoring System (ESP32)"</span><span class="t">,</span>`,
`      <span class="p">ProjectDescription</span> <span class="t">: </span><span class="s">"Developed an IoT-based health tracker using ESP32 to measure vital parameters and transmit real-time health data to a cloud dashboard."</span>`,
`    <span class="b">}</span><span class="t">,</span>`,

`    <span class="b">{</span>`,
`      <span class="p">ProjectTitle</span>       <span class="t">: </span><span class="s">"Home Automation System (Arduino)"</span><span class="t">,</span>`,
`      <span class="p">ProjectDescription</span> <span class="t">: </span><span class="s">"Built an Arduino-based home automation system to control appliances using sensors and relay modules for smart and energy-efficient living."</span>`,
`    <span class="b">}</span><span class="t">,</span>`,

`  <span class="t">],</span>`,
``,

`  <span class="cm">// ── Software Projects ───────────────────────────────</span>`,
`  <span class="p">software</span><span class="t">: [</span>`,

`    <span class="b">{</span>`,
`      <span class="p">ProjectTitle</span>       <span class="t">: </span><span class="s">"Local PhotoBooth Web App (HTML, CSS, JS, Node.js)"</span><span class="t">,</span>`,
`      <span class="p">ProjectDescription</span> <span class="t">: </span><span class="s">"Built a locally hosted photobooth web application that captures images using the device webcam and allows users to preview and take photos through an interactive browser interface."</span>`,
`    <span class="b">}</span><span class="t">,</span>`,

`    <span class="b">{</span>`,
`      <span class="p">ProjectTitle</span>       <span class="t">: </span><span class="s">"Sales Data Analytics Dashboard (SQL + Power BI)"</span><span class="t">,</span>`,
`      <span class="p">ProjectDescription</span> <span class="t">: </span><span class="s">"Performed data analysis using SQL and built interactive Power BI dashboards to visualize sales trends and key performance metrics following Agile workflows."</span>`,
`    <span class="b">}</span>`,

`  <span class="t">]</span>`,
``,
`<span class="t">};</span>`,
``,
`<span class="k">export default</span> <span class="t">lab;</span>`

]);

/* ══════════════════════════════════════════════════════════════
   ABOUT CONTENT — written as a JS class
══════════════════════════════════════════════════════════════ */
renderCode('about-code', [

`<span class="k">class</span> <span class="f">About</span> <span class="b">{</span>`,
``,

`  <span class="cm">// ── Personal Information ─────────────────────────────</span>`,
`  <span class="f">personalInfo</span><span class="b">()</span> <span class="b">{</span>`,
`    <span class="k">return</span> <span class="b">{</span>`,
`      <span class="p">name</span> <span class="t">: </span><span class="s">"Ch. Neha Singha"</span><span class="t">,</span>`,
`    <span class="b">};</span>`,
`  <span class="b">}</span>`,
``,

`  <span class="cm">// ── Skills ───────────────────────────────────────────</span>`,
`  <span class="f">skills</span><span class="b">()</span> <span class="b">{</span>`,

/* ══════════════════════════════════════════════════════════════
   PCB LED DOTS & NOTCH PADS
   LED dots are absolutely positioned children of #pcb-track.
   Their top is computed after the full layout renders.
══════════════════════════════════════════════════════════════ */
const SECTION_IDS = ['start', 'lab', 'about', 'contact'];
const pcbTrack    = document.getElementById('pcb-track');
const ledMap      = {};

/* Walk offsetParent chain to get top of el relative to ancestor */
function offsetTopRelTo(el, ancestor) {
    let top = 0, cur = el;
    while (cur && cur !== ancestor) {
        top += cur.offsetTop;
        cur  = cur.offsetParent;
    }
    return top;
}

/* Create / reposition hollow LED dots at each section heading */
function placeLEDs() {
    const wrapper = document.getElementById('page-wrapper');
    SECTION_IDS.forEach(id => {
        const sec  = document.getElementById(id);
        const head = sec && sec.querySelector('.section-title');
        if (!sec || !head) return;

        const yTop    = offsetTopRelTo(head, wrapper);
        const yCentre = yTop + head.offsetHeight / 2;

        if (!ledMap[id]) {
            const dot       = document.createElement('div');
            dot.className   = 'led-dot';
            dot.dataset.sec = id;
            pcbTrack.appendChild(dot);
            ledMap[id] = dot;
        }

        ledMap[id].style.top = (yCentre - 7) + 'px';
    });
}

/* Create decorative pad notches at midpoints between sections */
function placeNotches() {
    pcbTrack.querySelectorAll('.pcb-notch').forEach(n => n.remove());
    const wrapper = document.getElementById('page-wrapper');
    const secs    = SECTION_IDS.map(id => document.getElementById(id)).filter(Boolean);

    for (let i = 0; i < secs.length - 1; i++) {
        const yBottom = offsetTopRelTo(secs[i],     wrapper) + secs[i].offsetHeight;
        const yTopEl  = offsetTopRelTo(secs[i + 1], wrapper);
        const yMid    = (yBottom + yTopEl) / 2;

        const notch     = document.createElement('div');
        notch.className = 'pcb-notch';
        notch.style.top = (yMid - 12) + 'px';
        pcbTrack.appendChild(notch);
    }
}


/* ══════════════════════════════════════════════════════════════
   ACTIVE SECTION TRACKING — scroll-based
   On every scroll frame: find the section whose top edge is at
   or above 30% down the viewport AND is furthest down the page.
   That section is "active" → bold white nav + LED glow.
   Scroll-based (not IntersectionObserver) so no section is skipped.
══════════════════════════════════════════════════════════════ */
const navLinks = document.querySelectorAll('.nav-link');
let   current  = '';

function setActive(id) {
    if (id === current) return;
    current = id;
    navLinks.forEach(l => l.classList.toggle('active', l.dataset.sec === id));
    Object.entries(ledMap).forEach(([sec, dot]) =>
        dot.classList.toggle('lit', sec === id)
    );
}

function updateActive() {
    const trigger = window.scrollY + window.innerHeight * 0.30;
    let bestId = SECTION_IDS[0], bestTop = -Infinity;

    SECTION_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const top = el.getBoundingClientRect().top + window.scrollY;
        if (top <= trigger && top > bestTop) { bestTop = top; bestId = id; }
    });

    setActive(bestId);
}

/* Throttle scroll updates with requestAnimationFrame */
let rafPending = false;
window.addEventListener('scroll', () => {
    if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(() => { updateActive(); rafPending = false; });
    }
}, { passive: true });


/* ══════════════════════════════════════════════════════════════
   SLOT MACHINE NAME ANIMATION
   Characters cycle through random glyphs and settle left-to-right.
   Change 'Your Name Here' below to your real name.
══════════════════════════════════════════════════════════════ */
function slotMachine(element, finalText, totalDuration = 1800) {
    const glyphs  = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&!?';
    const letters = [...finalText];
    const rand    = () => glyphs[Math.floor(Math.random() * glyphs.length)];

    element.innerHTML = '';

    const spans = letters.map(ch => {
        const s     = document.createElement('span');
        s.className = 'slot-char';
        s.textContent = ch === ' ' ? '\u00A0' : rand();
        element.appendChild(s);
        return s;
    });

    letters.forEach((ch, i) => {
        if (ch === ' ') { spans[i].textContent = '\u00A0'; return; }

        const startDelay  = i * totalDuration * 0.04;
        const shuffleTime = totalDuration * 0.50 + i * 30;
        let elapsed = 0;

        setTimeout(() => {
            const iv = setInterval(() => {
                spans[i].textContent = rand();
                elapsed += 45;
                if (elapsed >= shuffleTime) {
                    clearInterval(iv);
                    spans[i].textContent = ch;
                }
            }, 45);
        }, startDelay);
    });
}


/* ══════════════════════════════════════════════════════════════
   INIT — runs after full page layout is complete
══════════════════════════════════════════════════════════════ */
window.addEventListener('load', () => {

    /* Build PCB LED dots and notch pads */
    placeLEDs();
    placeNotches();

    /* Run first scroll check — sets Start as active on load */
    updateActive();

    /* ── CHANGE 'Your Name Here' to your real name ── */
    setTimeout(() => {
        slotMachine(document.getElementById('slot-name'), 'Ch Neha Singha', 1800);
    }, 400);

});

/* Recompute dot/notch positions if window is resized */
window.addEventListener('resize', () => {
    placeLEDs();
    placeNotches();
});

</script>
